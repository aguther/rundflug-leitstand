name: Fehler
about: Reproduzierbarer Fehler im Rundflug-Leitstand
labels: [bug]
body:
  - type: input
    id: environment
    attributes:
      label: Umgebung
      placeholder: lokal / Abnahme / Produktion
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduktion
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Tatsächliches Verhalten
    validations:
      required: true
  - type: input
    id: requirements
    attributes:
      label: Betroffene Anforderungs-IDs

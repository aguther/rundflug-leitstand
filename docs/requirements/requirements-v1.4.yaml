    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-090",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",

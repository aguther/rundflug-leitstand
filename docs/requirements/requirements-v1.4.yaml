  {
    "id": "F-SLT-080",
    "section": "8.3 Fluggruppen, Slots und Warteschlangen",
    "requirement": "Nach jedem relevanten Ereignis berechnet das System Reihenfolge, Zuordnungen, Prognosen und Wartezeitspannen neu und verteilt den neuen Stand in Echtzeit an alle Geräte.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []

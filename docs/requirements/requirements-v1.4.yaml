    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-SLT-060",
    "section": "8.3 Fluggruppen, Slots und Warteschlangen",

    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-SLT-110",
    "section": "8.3 Fluggruppen, Slots und Warteschlangen",

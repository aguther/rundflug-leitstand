    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-080",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Die operative Queue wird je Ressourcengruppe geführt. Produktzugehörigkeit und stabile öffentliche Fluggruppen-/Slotnummern bleiben dabei erhalten.",

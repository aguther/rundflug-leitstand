    "tests": []
  },
  {
    "id": "F-RES-010",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Jedes buchbare Produkt verwendet genau eine Ressourcengruppe. Produktmerkmale wie Bezeichnung, Preis, prognostische Referenzdauer, davon getrennte zugesagte Flugzeit, öffentliche Darstellung und Verkaufsregeln sind von der Ressourcengruppe getrennt zu führen. Die zugesagte Flugzeit verändert keine operative Prognose.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-020",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Mehrere Produkte dürfen dieselbe Ressourcengruppe verwenden. Deren Nachfrage wird in einer gemeinsamen operativen Kapazität disponiert.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-030",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Eine Ressourcengruppe kann ein oder mehrere Flugzeuge enthalten. Standardmäßig besitzt jedes Flugzeug eine eigene Ressourcengruppe; die Zusammenfassung mehrerer Flugzeuge ist konfigurierbar.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-040",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Ein Flugzeug darf zu jedem Zeitpunkt höchstens einer aktiven Ressourcengruppe zugeordnet sein. Das System muss widersprüchliche Zuordnungen technisch verhindern.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-050",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Zuordnungen von Flugzeugen zu Ressourcengruppen besitzen Gültigkeitszeiträume und werden historisiert. Änderungen im laufenden Betrieb werden mit Auswirkungen auf Queue und Prognose sofort verarbeitet.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-060",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Ein Produkt verwendet genau eine Ressourcengruppe. Flugzeugkompatibilität und Passagierkapazität werden aus den konkret aktiv zugeordneten Flugzeugen abgeleitet; gepflegt werden Gate und planmäßige Prozessdauern, keine Freitext-Typenlisten oder manuelle Gruppenkapazität.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-070",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Ressourcengruppen besitzen einen eigenen Betriebsstatus: aktiv, pausiert, unterbrochen oder beendet. Der Status wirkt auf Verkauf, Aufruf, Prognose und Anzeigen.",

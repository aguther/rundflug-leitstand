    "section": "8.1 Ticketverkauf (Kasse)",
    "requirement": "Der Verkauf wird technisch gesperrt, wenn das Produkt oder seine Ressourcengruppe nicht verkaufbar ist, der Verkaufsschluss erreicht ist oder der Notfallmodus aktiv ist. Der Sperrgrund wird angezeigt.",

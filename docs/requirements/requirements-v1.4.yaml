    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-SLT-020",
    "section": "8.3 Fluggruppen, Slots und Warteschlangen",
    "requirement": "Zusammen gekaufte Tickets bleiben grundsätzlich zusammen. Ist eine Gruppe größer als die verfügbare Kapazität eines einzelnen Umlaufs, wird sie nur nach ausdrücklichem Hinweis auf unmittelbar aufeinanderfolgende Fluggruppen verteilt.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-SLT-030",
    "section": "8.3 Fluggruppen, Slots und Warteschlangen",
    "requirement": "Freie Plätze in noch nicht aufgerufenen Fluggruppen füllt das System automatisch mit der vordersten passenden Gruppe oder Einzelperson. Standby-Tickets dürfen bevorzugt werden. Ab dem Aufruf erfolgen Änderungen nur noch als bestätigungspflichtiger Vorschlag.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },

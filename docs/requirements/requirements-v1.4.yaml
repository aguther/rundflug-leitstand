    "stage": "V2",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-SLT-010",
    "section": "8.3 Fluggruppen, Slots und Warteschlangen",
    "requirement": "Das System bildet aus verkauften Tickets stabile Fluggruppen/Slots je Produkt. Die operative Reihenfolge wird innerhalb der zugehörigen Ressourcengruppe geführt. Beim Verkauf erfolgt keine Flugzeugzuordnung.",

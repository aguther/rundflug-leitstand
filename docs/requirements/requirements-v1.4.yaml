    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-RES-100",
    "section": "8.2 Produkte, Ressourcengruppen und Flugzeuge",
    "requirement": "Eine temporäre Umgruppierung eines Flugzeugs im laufenden Betrieb ist nur durch Leiter Flight Line oder Administrator zulässig, zeigt die prognostizierten Auswirkungen vor Bestätigung und wird protokolliert.",

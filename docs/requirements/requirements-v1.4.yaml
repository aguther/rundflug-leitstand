    "stage": "V1",
    "implementation": {
      "issue": "",
      "module": "",
      "status": "planned"
    },
    "tests": []
  },
  {
    "id": "F-SLT-070",
    "section": "8.3 Fluggruppen, Slots und Warteschlangen",
    "requirement": "Fluggruppenbildung und Verkauf verwenden die aus den aktuell nutzbaren Flugzeugen der Ressourcengruppe abgeleitete Kapazitätsspanne. Maßgeblich für den konkreten Umlauf ist die Kapazität des bestätigten Flugzeugs; eine Gruppe wird nur geteilt, wenn kein nutzbares Flugzeug sie gemeinsam aufnehmen kann und die Teilung ausdrücklich bestätigt wird.",
    "priority": "MUSS",
    "stage": "V1",
    "implementation": {
      "issue": "",

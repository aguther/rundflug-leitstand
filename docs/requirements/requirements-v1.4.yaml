  {
    "id": "F-KAS-160",
    "section": "8.1 Ticketverkauf (Kasse)",
    "requirement": "Die Kasse verkauft ausschließlich auf Basis der aktuellen Betriebs- und Prognoselage. Eine feste Flugzeug- oder Pilotenzuordnung durch die Kasse ist ausgeschlossen.",

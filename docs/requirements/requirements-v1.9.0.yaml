  - id: V19-RTE-010
    requirement: Flight Director liegt unter /flight-director und Flight Line unter /flight-line; der alte Assist-Pfad entfällt ohne Weiterleitung.
    status: implemented
  - id: V19-API-010
    requirement: Die Ticketsuche filtert OPEN serverseitig vor Cursor und Pagination ohne neue Domänen- oder Datenbankzustände.
    status: implemented
  - id: V19-QA-010
    requirement: Automatisierte und visuelle Abnahme deckt Favicon, Kasse, Druck, Statuslogik, neue Routen und entfernte Legacy-Metadaten ab.
